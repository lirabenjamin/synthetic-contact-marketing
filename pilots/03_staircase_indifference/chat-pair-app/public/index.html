<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Chat</title>
<style>
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; margin: 0; padding: 0; color: #1a1a1a; background: #fff; }
  #app { max-width: 720px; margin: 0 auto; padding: 16px; }
  .status { text-align: center; padding: 40px 20px; }
  .spinner { display: inline-block; width: 32px; height: 32px; border: 3px solid #e5e5e5; border-top-color: #2563eb; border-radius: 50%; animation: spin 0.8s linear infinite; margin-bottom: 16px; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .timer-bar { position: sticky; top: 0; background: #fff; padding: 12px 0; border-bottom: 1px solid #eee; text-align: center; z-index: 5; }
  .timer-label { font-size: 12px; color: #555; text-transform: uppercase; letter-spacing: 1px; margin-right: 8px; }
  .timer { font-size: 24px; font-weight: 700; font-variant-numeric: tabular-nums; }
  .timer.low { color: #dc2626; }
  .chat-pane { height: 50vh; min-height: 300px; overflow-y: auto; padding: 12px 0; display: flex; flex-direction: column; gap: 8px; }
  .msg { max-width: 75%; padding: 10px 14px; border-radius: 16px; font-size: 15px; line-height: 1.4; word-wrap: break-word; }
  .msg.me { align-self: flex-end; background: #2563eb; color: #fff; border-bottom-right-radius: 4px; }
  .msg.them { align-self: flex-start; background: #f1f5f9; color: #1a1a1a; border-bottom-left-radius: 4px; }
  .msg.sys { align-self: center; background: none; color: #888; font-size: 13px; font-style: italic; padding: 4px 8px; }
  .composer { display: flex; gap: 8px; padding: 10px 0; border-top: 1px solid #eee; background: #fff; position: sticky; bottom: 0; }
  .composer input { flex: 1; padding: 12px; border: 2px solid #ccc; border-radius: 8px; font-size: 15px; outline: none; }
  .composer input:focus { border-color: #2563eb; }
  .composer button { padding: 12px 20px; background: #2563eb; color: #fff; border: none; border-radius: 8px; font-size: 15px; font-weight: 600; cursor: pointer; }
  .composer button:disabled { background: #94a3b8; cursor: default; }
  .done-btn { display: block; margin: 24px auto 0; padding: 12px 28px; background: #2563eb; color: #fff; border: none; border-radius: 8px; font-size: 16px; font-weight: 600; cursor: pointer; }
</style>
</head>
<body>
<div id="app">
  <div id="view-wait" class="status">
    <div class="spinner"></div>
    <h3 id="wait-title">Connecting you with a participant…</h3>
    <p id="wait-sub" style="color:#555;">We're matching you with another participant. This usually takes under a minute.</p>
  </div>

  <div id="view-chat" style="display:none;">
    <div class="timer-bar">
      <span class="timer-label">Time remaining</span>
      <span class="timer" id="timer">3:00</span>
    </div>
    <div class="chat-pane" id="chat-pane"></div>
    <div class="composer">
      <input id="input" type="text" placeholder="Type a message…" autocomplete="off" maxlength="500">
      <button id="send">Send</button>
    </div>
  </div>

  <div id="view-end" class="status" style="display:none;">
    <h3 id="end-title">Chat complete</h3>
    <p id="end-sub" style="color:#555;"></p>
    <button class="done-btn" id="done-btn">Continue</button>
  </div>
</div>

<script src="/socket.io/socket.io.js"></script>
<script>
(function () {
  const params   = new URLSearchParams(window.location.search);
  const party    = params.get('party') === 'Republican' ? 'Republican' : 'Democrat';
  const outgroup = party === 'Democrat' ? 'Republican' : 'Democrat';
  const qid      = params.get('id') || ('guest_' + Math.random().toString(36).slice(2, 10));

  document.getElementById('wait-title').textContent = 'Connecting you with a ' + outgroup + '…';

  const views = {
    wait: document.getElementById('view-wait'),
    chat: document.getElementById('view-chat'),
    end:  document.getElementById('view-end'),
  };
  function show(v) { Object.keys(views).forEach(k => views[k].style.display = (k === v) ? '' : 'none'); }

  const socket = io();
  let endsAt = null;
  let timerInterval = null;
  let endedReason = null;

  socket.on('connect', () => {
    socket.emit('join', { party, qualtricsId: qid });
  });

  socket.on('waiting', () => {});

  socket.on('matched', ({ roomId, endsAt: e }) => {
    endsAt = e;
    show('chat');
    addSys('You are now connected to a ' + outgroup + '. You have 3 minutes. Be respectful.');
    startTimer();
    document.getElementById('input').focus();
  });

  socket.on('message', (msg) => {
    const pane = document.getElementById('chat-pane');
    const el = document.createElement('div');
    el.className = 'msg ' + (msg.from === qid ? 'me' : 'them');
    el.textContent = msg.text;
    pane.appendChild(el);
    pane.scrollTop = pane.scrollHeight;
  });

  socket.on('partnerLeft', () => {
    endedReason = 'partnerLeft';
    endChat('Your partner disconnected. Your responses have been recorded.');
  });

  socket.on('chatEnded', ({ reason }) => {
    endedReason = reason;
    endChat(reason === 'timeout' ? "Time's up — thanks for chatting!" : 'Chat ended.');
  });

  socket.on('noMatch', () => {
    endedReason = 'noMatch';
    show('end');
    document.getElementById('end-title').textContent = 'No match found';
    document.getElementById('end-sub').textContent = "We couldn't find another participant in time. Your responses have still been recorded.";
    notifyParent('chat_ended', 'noMatch');
  });

  function addSys(text) {
    const pane = document.getElementById('chat-pane');
    const el = document.createElement('div');
    el.className = 'msg sys';
    el.textContent = text;
    pane.appendChild(el);
    pane.scrollTop = pane.scrollHeight;
  }

  function startTimer() {
    const timerEl = document.getElementById('timer');
    function tick() {
      const remaining = Math.max(0, Math.round((endsAt - Date.now()) / 1000));
      const m = Math.floor(remaining / 60), s = remaining % 60;
      timerEl.textContent = m + ':' + (s < 10 ? '0' : '') + s;
      if (remaining <= 30) timerEl.classList.add('low');
      if (remaining <= 0) clearInterval(timerInterval);
    }
    tick();
    timerInterval = setInterval(tick, 500);
  }

  function endChat(msg) {
    clearInterval(timerInterval);
    show('end');
    document.getElementById('end-title').textContent = 'Chat complete';
    document.getElementById('end-sub').textContent = msg;
    notifyParent('chat_ended', endedReason || 'ended');
  }

  function notifyParent(type, reason) {
    try {
      window.parent.postMessage({ type, reason, qid }, '*');
    } catch (e) { /* noop */ }
  }

  document.getElementById('send').addEventListener('click', sendMsg);
  document.getElementById('input').addEventListener('keydown', (e) => { if (e.key === 'Enter') sendMsg(); });
  function sendMsg() {
    const input = document.getElementById('input');
    const text = input.value.trim();
    if (!text) return;
    socket.emit('message', text);
    input.value = '';
    input.focus();
  }

  document.getElementById('done-btn').addEventListener('click', () => {
    notifyParent('chat_continue', endedReason || 'ended');
  });
})();
</script>
</body>
</html>
